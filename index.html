<!DOCTYPE html>
<html>
<head>
  <title>Menu Bot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5a);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    .box {
      background: rgba(0,0,0,0.4);
      padding: 30px;
      border-radius: 15px;
    }

    a {
      display: block;
      margin: 10px;
      padding: 10px;
      background: #00c3ff;
      color: black;
      text-decoration: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>🔥 Menu Bot</h1>
    <p>Welcome to your website!</p>

    <a href="#">Menu 1</a>
    <a href="#">Menu 2</a>
  </div>
</body>
</html>
